name: Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    # Build on: tag push, manual trigger, OR any merged PR — UNLESS it carries
    # the 'skip-deploy' label (use that for docs-only / chore PRs that shouldn't
    # trigger a production deploy). Inverted from the old 'deploy'-label gate,
    # which was easy to forget and silently shipped nothing.
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !contains(github.event.pull_request.labels.*.name, 'skip-deploy'))
    steps:
      # For PR-merge events, the ref is refs/pull/.../merge — check out master
      # explicitly so the build uses the merged code on the default branch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && 'master' || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
