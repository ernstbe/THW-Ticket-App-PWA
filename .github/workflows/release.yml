name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/THWTicketApp.Web/THWTicketApp.Web.csproj --configuration Release --output release

      - name: Create release archive
        run: cd release/wwwroot && zip -r ../../thw-ticket-app-${{ github.ref_name }}.zip .

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Installation
            - **GitHub Pages**: Automatisch deployed
            - **Docker**: `docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - **Self-hosted**: ZIP entpacken und mit beliebigem Webserver hosten
          files: thw-ticket-app-${{ github.ref_name }}.zip
          generate_release_notes: true
