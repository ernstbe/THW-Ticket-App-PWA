<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THW Ticket App</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="icon" type="image/png" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
            <svg width="60" height="60" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
                <path fill="#003399" d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z"/>
            </svg>
            <p style="margin-top:16px;color:#003399;font-family:Roboto,sans-serif;">Lade THW Ticket App...</p>
        </div>
        <style>
            @keyframes spin { 100% { transform: rotate(360deg); } }
        </style>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;z-index:1000;">
        Ein Fehler ist aufgetreten.
        <a href="" class="reload">Neu laden</a>
        <a class="dismiss" style="cursor:pointer;">Schließen</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        window.registerConnectivityHandler = function (dotNetRef) {
            window.addEventListener('online', function () {
                dotNetRef.invokeMethodAsync('OnConnectivityChanged', true);
            });
            window.addEventListener('offline', function () {
                dotNetRef.invokeMethodAsync('OnConnectivityChanged', false);
            });
        };
    </script>
</body>
</html>
