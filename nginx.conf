events { }

http {
    include mime.types;
    default_type application/octet-stream;

    # Blazor WASM specific MIME types
    types {
        application/wasm wasm;
        application/octet-stream dll;
        application/manifest+json webmanifest;
    }

    # Security-header values. nginx's `add_header` does NOT inherit from
    # a parent block when the current block declares any `add_header` of
    # its own, so the values live as variables here and are explicitly
    # re-emitted in every location that overrides `Cache-Control`.
    map $sent_http_content_type $pwa_csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https://cdn.socket.io https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
        gzip_min_length 256;

        # Files that gate every update — the browser MUST revalidate these on every
        # request, otherwise the existing SW update flow (banner + SKIP_WAITING) can
        # never trigger because the user keeps getting served an old service-worker.js
        # from the HTTP cache. These rules must come BEFORE the generic .js block.
        location = /service-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Content-Security-Policy $pwa_csp always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            expires off;
        }
        location = /service-worker-assets.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Content-Security-Policy $pwa_csp always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            expires off;
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Content-Security-Policy $pwa_csp always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            expires off;
        }
        # _framework/dotnet.js carries the hashes of every framework asset
        # (runtime + native + all assemblies). It replaced blazor.boot.json as
        # the boot manifest in .NET 8+ — if it's stale, the boot path resolves
        # to old hashed runtime/native files (or 404s if they were removed in
        # the latest deploy). MUST revalidate every request, otherwise the
        # generic 24h .js cache rule below would keep stale users on broken
        # mixed builds for up to a day after every deploy.
        location = /_framework/dotnet.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Content-Security-Policy $pwa_csp always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            expires off;
        }

        # Cache static assets
        location ~* \.(dll|wasm|blat|dat)$ {
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
        }

        # SPA fallback: serve index.html for all routes
        location / {
            add_header Content-Security-Policy $pwa_csp always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Frame-Options "DENY" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
