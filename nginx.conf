events { }

http {
    include mime.types;
    default_type application/octet-stream;

    # Blazor WASM specific MIME types
    types {
        application/wasm wasm;
        application/octet-stream dll;
        application/manifest+json webmanifest;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
        gzip_min_length 256;

        # Files that gate every update — the browser MUST revalidate these on every
        # request, otherwise the existing SW update flow (banner + SKIP_WAITING) can
        # never trigger because the user keeps getting served an old service-worker.js
        # from the HTTP cache. These rules must come BEFORE the generic .js block.
        location = /service-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires off;
        }
        location = /service-worker-assets.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires off;
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires off;
        }
        # _framework/blazor.boot.json carries the hashes of every framework asset.
        # If it's stale, the boot path resolves to old DLLs.
        location = /_framework/blazor.boot.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires off;
        }

        # Cache static assets
        location ~* \.(dll|wasm|blat|dat)$ {
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=86400";
        }

        # SPA fallback: serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
